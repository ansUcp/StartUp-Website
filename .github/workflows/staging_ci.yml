name: Staging CI Bugfix

on:
  pull_request:
    branches:
      - release
    paths:
      - 'bugfix/'

jobs:
  validate_bugfix:
    runs-on: ubuntu-latest
    environment: staging-env
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node
        uses: actions/setup-node@v1
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build